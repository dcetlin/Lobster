# Smell Pattern Registry
# Populated by system retrospective. Each entry is a recurring anti-pattern
# detected in Lobster's operation. Descriptive and tracking fields only.
# Automation fields (detection_heuristic, threshold, issue_template, github_label)
# have been deferred pending a logged design decision authorizing automated
# smell detection and issue filing (see oracle gap from PR #882/#884).
version: 1
patterns:
  - id: write_result_not_back_propagated
    name: "write_result not back-propagated to executor output"
    description: "Subagents call write_result but the executor output file receives only a dispatch receipt, not the result payload. The executor cannot confirm completion at next sweep. Every steward spiral re-runs 'is this done?' against records with zero evidence content. Root cause: executor-heartbeat.py does not intercept write_result responses to back-propagate result text and status to the UoW output file."
    severity: high
    threshold: 1
    recurrence_count: 1
    first_detected: "2026-04-23"
    last_detected: "2026-04-23"
    issue_ref: "dcetlin/Lobster#867"
    status: open

  - id: bare_python3_in_migrations
    name: "bare python3 in upgrade.sh migrations"
    description: "upgrade.sh migrations use bare python3 or python instead of uv run. The CLAUDE.md rule requiring uv run instead of python3 exists, but enforcement does not. Oracle review caught it in PR #866 learnings. This is a hygiene enforcement gap, not a knowledge gap — it has recurred 4 times."
    severity: medium
    threshold: 2
    recurrence_count: 4
    first_detected: "2026-04-22"
    last_detected: "2026-04-23"
    issue_ref: null
    status: open

  - id: oracle_dual_write_no_enforcement
    name: "oracle dual-write (decisions.md + oracle/verdicts/) with no enforcement"
    description: "Oracle agents write to both decisions.md and oracle/verdicts/ simultaneously. PR #865 declared oracle/verdicts/pr-{N}.md as canonical. PR #875 deprecated decisions.md and archived it, but agent prompt templates were not audited to confirm decisions.md write paths were fully removed. The deprecation was structural but behavioral enforcement was not verified complete."
    severity: medium
    threshold: 2
    recurrence_count: 2
    first_detected: "2026-04-22"
    last_detected: "2026-04-23"
    issue_ref: null
    status: open

  - id: rolling_summary_bloat
    name: "rolling-summary.md bloat fix agreed but not automated"
    description: "rolling-summary.md exceeds 50 lines and is not overwritten on each session-consolidation run. Design decision (overwrite to 50-line snapshot) was agreed and recorded but no agent has been assigned to implement it. The bloat amplifies each compaction — each one costs more reconstruction overhead than necessary. This fix has been carried as a thread item for 3+ sessions."
    severity: medium
    threshold: 2
    recurrence_count: 3
    first_detected: "2026-04-21"
    last_detected: "2026-04-23"
    issue_ref: null
    status: open

  - id: health_probe_memory_saturation
    name: "health probes saturating vector memory"
    description: "Cron heartbeats and health pings are written to the vector memory DB alongside meaningful semantic events, degrading memory retrieval signal-to-noise over time. The type discriminator (type: health_probe, type: cron_heartbeat) is already present in message metadata but not used as an ingestion filter gate."
    severity: low
    threshold: 2
    recurrence_count: 2
    first_detected: "2026-04-22"
    last_detected: "2026-04-23"
    issue_ref: null
    status: open
