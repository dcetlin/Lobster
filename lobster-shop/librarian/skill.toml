[skill]
name = "librarian"
version = "1.2.0"
description = "Maintenance mode — audit, triage, label, and organize issues, code, and workspace without writing big new features or deleting anything"
author = "Lobster"
category = "behavioral"

[activation]
mode = "contextual"
triggers = []
context_patterns = [
    "librarian mode",
    "enter librarian",
    "/librarian",
    "maintenance mode",
    "super librarian",
]

[layering]
priority = 70
merge_strategy = "replace"

[provides]
mcp_tools = []
bot_commands = ["/librarian"]

[compatibility]
enhances = []
conflicts = []

[dependencies]
pip = []
npm = []
system = ["gh", "git"]
api_keys = []

[dependencies.runtime]
python = ">=3.11"
