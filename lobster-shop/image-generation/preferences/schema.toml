[provider]
type = "string"
description = "Image generation provider: 'nano-banana-2' (fast, text+image mixed) or 'imagen-4' (dedicated, aspect ratio control)."
required = false
options = ["nano-banana-2", "imagen-4"]

[aspect_ratio]
type = "string"
description = "Default aspect ratio for generated images (imagen-4 only)."
required = false
options = ["1:1", "3:4", "4:3", "9:16", "16:9"]

[save_locally]
type = "boolean"
description = "Save generated images to ~/messages/images/generated/."
required = false
