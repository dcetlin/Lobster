# Lobster Test Orchestration
#
# This docker-compose file orchestrates all test environments.
#
# Usage:
#   # Run unit tests
#   docker compose -f tests/docker/docker-compose.test.yml up unit-tests
#
#   # Run integration tests
#   docker compose -f tests/docker/docker-compose.test.yml up integration-tests
#
#   # Run fresh install test
#   docker compose -f tests/docker/docker-compose.test.yml up install-test
#
#   # Run all tests
#   docker compose -f tests/docker/docker-compose.test.yml up

services:
  # Mock Telegram API server
  mock-telegram:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.integration
    command: [".venv/bin/python", "/home/testuser/lobster/tests/docker/mock_telegram_runner.py"]
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/bottest_token/getMe"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - lobster-test

  # Unit tests - no external dependencies
  unit-tests:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.integration
    command: [".venv/bin/pytest", "tests/unit", "-v", "--tb=short"]
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - test-results:/home/testuser/lobster/test-results
    networks:
      - lobster-test

  # Integration tests - requires mock services
  integration-tests:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.integration
    command: [".venv/bin/pytest", "tests/integration", "-v", "--tb=short", "-m", "not docker"]
    environment:
      - MOCK_TELEGRAM_URL=http://mock-telegram:8081
      - TELEGRAM_BOT_TOKEN=test_token
      - TELEGRAM_ALLOWED_USERS=123456
    depends_on:
      mock-telegram:
        condition: service_healthy
    volumes:
      - test-results:/home/testuser/lobster/test-results
    networks:
      - lobster-test

  # Fresh installation test
  #
  # Runs install.sh --non-interactive against the pre-copied source tree, then
  # verifies that the lobster CLI is installed and responds correctly.
  #
  # The LOBSTER_INSTALL_DIR env var tells install.sh to use the pre-copied
  # source at /home/testuser/lobster rather than cloning from GitHub.
  install-test:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
    command: ["bash", "/home/testuser/lobster/tests/docker/run-install-test.sh"]
    networks:
      - lobster-test

  # Stress tests - high volume testing
  stress-tests:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.integration
    command: [".venv/bin/pytest", "tests/stress", "-v", "--tb=short", "--timeout=300"]
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - test-results:/home/testuser/lobster/test-results
    networks:
      - lobster-test

  # GitHub MCP installation test
  github-mcp-test:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
    command: ["bash", "-c", "
      echo '=== Testing GitHub MCP Installation ===' &&
      cd /home/testuser/lobster &&

      # Create basic environment
      mkdir -p /home/testuser/messages/{inbox,outbox,processed,config,audio,task-outputs} &&
      mkdir -p /home/testuser/lobster-workspace/logs &&

      # Set up Python environment
      python3 -m venv .venv &&
      .venv/bin/pip install --upgrade pip &&
      .venv/bin/pip install mcp python-telegram-bot watchdog python-dotenv &&

      # Create config with GitHub PAT (passed via env var)
      mkdir -p config &&
      echo 'TELEGRAM_BOT_TOKEN=test_token' > config/config.env &&
      echo 'TELEGRAM_ALLOWED_USERS=123456' >> config/config.env &&
      if [ -n \"$GITHUB_PAT\" ]; then
        echo \"GITHUB_PERSONAL_ACCESS_TOKEN=$GITHUB_PAT\" >> config/config.env &&
        echo 'GitHub PAT configured in config.env'
      fi &&

      # Test Claude MCP configuration (mock - Claude CLI may not be available)
      echo 'Testing MCP configuration commands...' &&
      echo 'Would run: claude mcp add-json github ...' &&

      # Verify setup.sh contains GitHub MCP step
      grep -q 'GitHub MCP Server' setup.sh && echo 'setup.sh contains GitHub MCP step' &&

      echo '=== GitHub MCP Installation Test Complete ==='
    "]
    environment:
      - GITHUB_PAT=${GITHUB_PAT:-}
    networks:
      - lobster-test

  # Full test suite
  all-tests:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.integration
    command: [".venv/bin/pytest", "tests/", "-v", "--tb=short", "-m", "not docker"]
    environment:
      - MOCK_TELEGRAM_URL=http://mock-telegram:8081
      - TELEGRAM_BOT_TOKEN=test_token
      - TELEGRAM_ALLOWED_USERS=123456
    depends_on:
      mock-telegram:
        condition: service_healthy
    volumes:
      - test-results:/home/testuser/lobster/test-results
    networks:
      - lobster-test

volumes:
  test-results:

networks:
  lobster-test:
    driver: bridge
